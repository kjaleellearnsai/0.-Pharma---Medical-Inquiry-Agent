# Build, publish, and deploy Medical Inquiry Agent services to Cloud Run.
# See README.md → Architecture → CI/CD Pipeline for the full flow diagram.

name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: medical-inquiry-agent
  GCP_REGION: us-central1
  ARTIFACT_REGISTRY_HOST: us-central1-docker.pkg.dev
  ARTIFACT_REPOSITORY: medical-inquiry-agent
  CLOUD_SQL_INSTANCE: medical-inquiry-agent:us-central1:pharma-dashboard-db
  MCP_SERVICE: medical-inquiry-mcp
  DASHBOARD_SERVICE: medical-inquiry-dashboard
  WORKING_DIR: mcp-medical-server

jobs:
  test:
    name: CI · Lint & compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            mcp-medical-server/requirements.txt
            mcp-medical-server/requirements-dashboard.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dashboard.txt pip-audit

      - name: Compile Python sources
        run: |
          python -m py_compile main.py app.py

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt -r requirements-dashboard.txt
        continue-on-error: true

  build-and-deploy:
    name: CD · Build, deploy, smoke test
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY_HOST }} --quiet

      - name: Capture current Cloud Run revisions
        id: rollback
        run: |
          MCP_REV=$(gcloud run services describe "${{ env.MCP_SERVICE }}" \
            --project "${{ env.GCP_PROJECT_ID }}" \
            --region "${{ env.GCP_REGION }}" \
            --format='value(status.traffic[0].revisionName)' 2>/dev/null || true)
          DASH_REV=$(gcloud run services describe "${{ env.DASHBOARD_SERVICE }}" \
            --project "${{ env.GCP_PROJECT_ID }}" \
            --region "${{ env.GCP_REGION }}" \
            --format='value(status.traffic[0].revisionName)' 2>/dev/null || true)
          echo "mcp_revision=${MCP_REV}" >> "$GITHUB_OUTPUT"
          echo "dash_revision=${DASH_REV}" >> "$GITHUB_OUTPUT"

      - name: Build and push MCP server image
        env:
          IMAGE: ${{ env.ARTIFACT_REGISTRY_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/${{ env.MCP_SERVICE }}
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          docker build \
            -f Dockerfile \
            -t "${IMAGE}:${{ github.sha }}" \
            -t "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

      - name: Build and push dashboard image
        env:
          IMAGE: ${{ env.ARTIFACT_REGISTRY_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/${{ env.DASHBOARD_SERVICE }}
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          docker build \
            -f Dockerfile.dashboard \
            -t "${IMAGE}:${{ github.sha }}" \
            -t "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

      - name: Scan MCP image for vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.ARTIFACT_REGISTRY_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/${{ env.MCP_SERVICE }}:${{ github.sha }}
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

      - name: Deploy MCP server to Cloud Run
        id: deploy-mcp
        env:
          IMAGE: ${{ env.ARTIFACT_REGISTRY_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/${{ env.MCP_SERVICE }}:${{ github.sha }}
        run: |
          gcloud run deploy "${{ env.MCP_SERVICE }}" \
            --project "${{ env.GCP_PROJECT_ID }}" \
            --region "${{ env.GCP_REGION }}" \
            --image "${IMAGE}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --add-cloudsql-instances "${{ env.CLOUD_SQL_INSTANCE }}" \
            --set-env-vars "GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }},PINECONE_INDEX_NAME=omni-rag-platform-index,GCS_BUCKET_NAME=pharma-medical-reference-docs,GCP_PUBSUB_TOPIC=pharmacovigilance-alerts,EMBED_MODEL_NAME=text-embedding-004" \
            --set-secrets "PINECONE_API_KEY=PINECONE_API_KEY:latest,DB_PASSWORD=DB_PASSWORD:latest,ANTHROPIC_MCP_SECRET=ANTHROPIC_MCP_SECRET:latest,GCP_SERVICE_ACCOUNT_JSON=GCP_SERVICE_ACCOUNT_JSON:latest"

          MCP_URL=$(gcloud run services describe "${{ env.MCP_SERVICE }}" \
            --project "${{ env.GCP_PROJECT_ID }}" \
            --region "${{ env.GCP_REGION }}" \
            --format='value(status.url)')
          echo "url=${MCP_URL}" >> "$GITHUB_OUTPUT"

      - name: Deploy MSL dashboard to Cloud Run
        id: deploy-dashboard
        env:
          IMAGE: ${{ env.ARTIFACT_REGISTRY_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/${{ env.DASHBOARD_SERVICE }}:${{ github.sha }}
        run: |
          gcloud run deploy "${{ env.DASHBOARD_SERVICE }}" \
            --project "${{ env.GCP_PROJECT_ID }}" \
            --region "${{ env.GCP_REGION }}" \
            --image "${IMAGE}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --add-cloudsql-instances "${{ env.CLOUD_SQL_INSTANCE }}" \
            --set-secrets "DB_PASSWORD=DB_PASSWORD:latest"

          DASH_URL=$(gcloud run services describe "${{ env.DASHBOARD_SERVICE }}" \
            --project "${{ env.GCP_PROJECT_ID }}" \
            --region "${{ env.GCP_REGION }}" \
            --format='value(status.url)')
          echo "url=${DASH_URL}" >> "$GITHUB_OUTPUT"

      - name: Smoke test MCP endpoint
        id: smoke-mcp
        env:
          MCP_URL: ${{ steps.deploy-mcp.outputs.url }}
          ANTHROPIC_MCP_SECRET: ${{ secrets.ANTHROPIC_MCP_SECRET }}
        run: |
          set -euo pipefail
          HTTP_CODE=$(curl -sS -o /tmp/mcp-smoke.json -w "%{http_code}" \
            -H "Authorization: Bearer ${ANTHROPIC_MCP_SECRET}" \
            "${MCP_URL}/mcp")
          echo "MCP smoke response (${HTTP_CODE}):"
          cat /tmp/mcp-smoke.json
          test "${HTTP_CODE}" = "200"
          grep -q '"status"[[:space:]]*:[[:space:]]*"ok"' /tmp/mcp-smoke.json

      - name: Smoke test MSL dashboard
        id: smoke-dashboard
        env:
          DASH_URL: ${{ steps.deploy-dashboard.outputs.url }}
        run: |
          set -euo pipefail
          HTTP_CODE=$(curl -sS -o /tmp/dash-smoke.html -w "%{http_code}" "${DASH_URL}/")
          echo "Dashboard smoke response code: ${HTTP_CODE}"
          test "${HTTP_CODE}" = "200"
          grep -qi streamlit /tmp/dash-smoke.html

      - name: Roll back Cloud Run on smoke test failure
        if: failure() && (steps.smoke-mcp.outcome == 'failure' || steps.smoke-dashboard.outcome == 'failure')
        run: |
          set -euo pipefail
          MCP_REV="${{ steps.rollback.outputs.mcp_revision }}"
          DASH_REV="${{ steps.rollback.outputs.dash_revision }}"

          if [ -n "${MCP_REV}" ]; then
            echo "Rolling back ${{ env.MCP_SERVICE }} to ${MCP_REV}"
            gcloud run services update-traffic "${{ env.MCP_SERVICE }}" \
              --project "${{ env.GCP_PROJECT_ID }}" \
              --region "${{ env.GCP_REGION }}" \
              --to-revisions "${MCP_REV}=100"
          fi

          if [ -n "${DASH_REV}" ]; then
            echo "Rolling back ${{ env.DASHBOARD_SERVICE }} to ${DASH_REV}"
            gcloud run services update-traffic "${{ env.DASHBOARD_SERVICE }}" \
              --project "${{ env.GCP_PROJECT_ID }}" \
              --region "${{ env.GCP_REGION }}" \
              --to-revisions "${DASH_REV}=100"
          fi

          exit 1
